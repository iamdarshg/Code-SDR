name: V2 resume fine-pitch route

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  resume:
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Recover five-pass routed board
        run: |
          set -euo pipefail
          mkdir -p baseline hardware/v2/build
          gh run download 29689598311 --repo "$GITHUB_REPOSITORY" --name Code-SDR-V2-route-five-pass --dir baseline
          cp baseline/Code-SDR-V2.kicad_pcb hardware/v2/Code-SDR-V2.kicad_pcb
          printf '{"components": {}}\n' > hardware/v2/build/schematic_paths.json
          sed -i 's/Via\[0-3\]_600:300_um/Via[0-3]_450:200_um/' hardware/v2/tools/generate_pcb.py
          docker pull kicad/kicad:9.0.9-full
          curl -fL --retry 4 --retry-delay 5 -o "$RUNNER_TEMP/freerouting.jar" https://github.com/freerouting/freerouting/releases/download/v2.2.4/freerouting-2.2.4.jar
      - name: Export existing copper and tune remaining-route rules
        run: |
          set -euo pipefail
          docker run --rm --user 0:0 -v "$GITHUB_WORKSPACE:/work" -w /work --entrypoint /bin/bash kicad/kicad:9.0.9-full -lc 'python3 hardware/v2/tools/export_route_checkpoint.py --board hardware/v2/Code-SDR-V2.kicad_pcb' || true
          test -s hardware/v2/build/Code-SDR-V2.dsn
          sudo chown -R "$(id -u):$(id -g)" hardware/v2/build
          python3 - <<'PY'
          from pathlib import Path
          import re
          p=Path('hardware/v2/build/Code-SDR-V2.dsn')
          s=p.read_text()
          def tune(name,next_name,width,clearance):
              global s
              a=s.index(f'    (class {name}\n')
              b=s.index(f'    (class {next_name}',a)
              block=s[a:b]
              block=re.sub(r'\(width \d+\)',f'(width {width})',block,count=1)
              block=re.sub(r'\(clearance \d+\)',f'(clearance {clearance})',block,count=1)
              s=s[:a]+block+s[b:]
          tune('RF_50','IF_DIFF',300,150)
          tune('IF_DIFF','DIGITAL_HS',180,120)
          tune('DIGITAL_HS','POWER',130,100)
          tune('POWER','DEFAULT',200,100)
          a=s.index('    (class DEFAULT\n')
          s=s[:a]+s[a:].replace('(width 150)','(width 120)',1)
          p.write_text(s)
          PY
          grep -A12 '    (class POWER' hardware/v2/build/Code-SDR-V2.dsn
          ! grep -q '^    (net GND' hardware/v2/build/Code-SDR-V2.dsn
      - name: Route residual connections
        run: |
          timeout --signal=TERM --kill-after=2m 130m \
            java -Xmx5600m -jar "$RUNNER_TEMP/freerouting.jar" \
            -de hardware/v2/build/Code-SDR-V2.dsn \
            -do hardware/v2/build/Code-SDR-V2-resumed.ses \
            -mp 18 -mt 0 -da -dct 1 --gui.enabled=false \
            2>&1 | tee hardware/v2/build/freerouting-resume.log
          test -s hardware/v2/build/Code-SDR-V2-resumed.ses
      - name: Import and validate resumed route
        run: |
          cat > hardware/v2/build/import_resumed.py <<'PY'
          from pathlib import Path
          import pcbnew
          p=Path('hardware/v2/Code-SDR-V2.kicad_pcb')
          b=pcbnew.LoadBoard(str(p))
          if not pcbnew.ImportSpecctraSES(b,'hardware/v2/build/Code-SDR-V2-resumed.ses'):
              raise SystemExit('SES import failed')
          for zone in b.Zones(): zone.SetPadConnection(pcbnew.ZONE_CONNECTION_FULL)
          pcbnew.ZONE_FILLER(b).Fill(b.Zones())
          pcbnew.SaveBoard(str(p),b)
          PY
          docker run --rm --user 0:0 -v "$GITHUB_WORKSPACE:/work" -w /work --entrypoint /bin/bash kicad/kicad:9.0.9-full -lc '
            python3 hardware/v2/build/import_resumed.py
            python3 hardware/v2/tools/add_rf_via_fences.py
            kicad-cli pcb drc --format json --severity-all --all-track-errors --schematic-parity --units mm -o hardware/v2/build/drc-resumed.json hardware/v2/Code-SDR-V2.kicad_pcb || true
            python3 hardware/v2/tools/validate_route.py > hardware/v2/build/validate-resumed.log 2>&1 || true
          '
          python3 - <<'PY'
          import json
          from collections import Counter
          from pathlib import Path
          d=json.loads(Path('hardware/v2/build/drc-resumed.json').read_text())
          s={k:len(d.get(k,[])) for k in ('violations','unconnected_items','schematic_parity')}
          s['violation_types']=dict(Counter(x.get('type','unknown') for x in d.get('violations',[])))
          Path('hardware/v2/build/resumed-summary.json').write_text(json.dumps(s,indent=2)+'\n')
          print(s)
          PY
      - name: Upload resumed route
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Code-SDR-V2-resumed-route
          path: |
            hardware/v2/Code-SDR-V2.kicad_pcb
            hardware/v2/build/Code-SDR-V2.dsn
            hardware/v2/build/Code-SDR-V2-resumed.ses
            hardware/v2/build/freerouting-resume.log
            hardware/v2/build/drc-resumed.json
            hardware/v2/build/resumed-summary.json
            hardware/v2/build/validate-resumed.log
            hardware/v2/build/ROUTE_STATISTICS.csv
          retention-days: 1
          if-no-files-found: warn
