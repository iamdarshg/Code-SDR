name: PCB recovery inventory

on:
  push:
    branches:
      - agent/pcb-recovery-routing
    paths:
      - .github/workflows/pcb-recovery-inventory.yml
      - tools/pcb/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch every reachable ref
        run: |
          git fetch --all --tags --prune --force

      - name: Build PCB recovery report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p hardware/recovery
          report=hardware/recovery/PCB_RECOVERY_REPORT.md
          {
            echo '# PCB recovery inventory'
            echo
            echo "Generated from commit \`$(git rev-parse HEAD)\` using the complete reachable Git history."
            echo
            echo '## Reachable refs'
            echo '```text'
            git for-each-ref --sort=refname --format='%(refname) %(objectname)' refs/heads refs/remotes refs/tags
            echo '```'
            echo
            echo '## Current KiCad project files'
            echo '```text'
            find . -type f \( -name '*.kicad_pcb' -o -name '*.kicad_sch' -o -name '*.kicad_pro' -o -name '*.kicad_dru' \) -not -path './.git/*' -print | sort
            echo '```'
            echo
            echo '## KiCad and handoff files seen anywhere in history'
            echo '```text'
            git log --all --name-only --pretty=format: | sed '/^$/d' | grep -E '(^|/)(past_conversation\.md|[^/]+\.kicad_(pcb|sch|pro|dru))$' | sort -u || true
            echo '```'
            echo
            echo '## Commits touching PCB boards or handoff notes'
            echo '```text'
            git log --all --date=iso-strict --pretty='format:%H %ad %D %s' -- '*.kicad_pcb' 'past_conversation.md' '**/past_conversation.md' || true
            echo '```'
            echo
            echo '## Deleted or renamed candidate files'
            echo '```text'
            git log --all --diff-filter=DR --summary -- '*.kicad_pcb' '*.kicad_sch' '*.kicad_pro' 'past_conversation.md' '**/past_conversation.md' || true
            echo '```'
            echo
            echo '## Board count by reachable commit tip'
            echo '```text'
            while read -r ref sha; do
              count=$(git ls-tree -r --name-only "$sha" | grep -cE '\.kicad_pcb$' || true)
              printf '%s %s boards=%s\n' "$ref" "$sha" "$count"
            done < <(git for-each-ref --format='%(refname) %(objectname)' refs/heads refs/remotes refs/tags)
            echo '```'
          } > "$report"

      - name: Commit inventory report
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add hardware/recovery/PCB_RECOVERY_REPORT.md
          if git diff --cached --quiet; then
            echo 'No report changes to commit.'
          else
            git commit -m 'chore: inventory PCB recovery history [skip ci]'
            git push origin HEAD:agent/pcb-recovery-routing
          fi
