name: V2 independent signal-group routes

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  route-group:
    strategy:
      fail-fast: false
      matrix:
        group: [rf, digital, default]
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Recover validated DSN and tools
        run: |
          set -euo pipefail
          mkdir -p baseline hardware/v2/build
          gh run download 29689598311 --repo "$GITHUB_REPOSITORY" --name Code-SDR-V2-route-five-pass --dir baseline
          cp baseline/build/Code-SDR-V2.dsn hardware/v2/build/group-${{ matrix.group }}.dsn
          curl -fL --retry 4 --retry-delay 5 -o "$RUNNER_TEMP/freerouting.jar" https://github.com/freerouting/freerouting/releases/download/v2.2.4/freerouting-2.2.4.jar
      - name: Build group-only DSN
        env:
          ROUTE_GROUP: ${{ matrix.group }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os,re
          group=os.environ['ROUTE_GROUP']
          p=Path(f'hardware/v2/build/group-{group}.dsn')
          s=p.read_text().replace('Via[0-3]_600:300_um','Via[0-3]_450:200_um')

          def block_spans(text, token):
              out=[]; pos=0
              while True:
                  a=text.find(token,pos)
                  if a<0: break
                  depth=0; quoted=False; escaped=False
                  for i in range(a,len(text)):
                      c=text[i]
                      if quoted:
                          if escaped: escaped=False
                          elif c=='\\': escaped=True
                          elif c=='"': quoted=False
                      else:
                          if c=='"': quoted=True
                          elif c=='(': depth+=1
                          elif c==')':
                              depth-=1
                              if depth==0:
                                  out.append((a,i+1,text[a:i+1])); pos=i+1; break
                  else: raise RuntimeError('unbalanced DSN')
              return out

          classes={}
          for name in ['RF_CRITICAL','RF_50','IF_DIFF','DIGITAL_HS','POWER','DEFAULT']:
              token=f'    (class {name}\n'
              spans=block_spans(s,token)
              if not spans: continue
              _,_,blk=spans[0]
              head=blk.split('(circuit',1)[0].split('(rule',1)[0]
              names=[]
              for line in head.splitlines()[1:]:
                  line=line.strip()
                  if not line or line.startswith('('): continue
                  names.extend(x.strip('"') for x in re.findall(r'"[^"]+"|[^\s()]+',line))
              classes[name]=set(names)
          keep={'rf':classes.get('RF_CRITICAL',set())|classes.get('RF_50',set())|classes.get('IF_DIFF',set()),
                'digital':classes.get('DIGITAL_HS',set()),
                'default':classes.get('DEFAULT',set())}[group]
          keep.discard('GND')
          power=classes.get('POWER',set())
          keep-=power

          removals=[]
          for a,b,blk in block_spans(s,'    (net '):
              m=re.match(r'\s*\(net\s+("[^"]+"|[^\s()]+)',blk)
              if not m: continue
              name=m.group(1).strip('"')
              if name not in keep: removals.append((a,b))
          for a,b in reversed(removals): s=s[:a]+s[b:]

          # Remove names not present from every class, without touching planes or net declarations.
          for cname in ['RF_CRITICAL','RF_50','IF_DIFF','DIGITAL_HS','POWER','DEFAULT']:
              spans=block_spans(s,f'    (class {cname}\n')
              if not spans: continue
              a,b,blk=spans[0]
              for name in classes.get(cname,set())-keep:
                  blk=re.sub(r'(?<!\S)"?'+re.escape(name)+r'"?(?!\S)','',blk)
              s=s[:a]+blk+s[b:]

          # Dense but standard PCB fabrication rules; RF critical class remains unchanged.
          def tune(name,next_name,w,c):
              nonlocal_s=None
              global s
              a=s.find(f'    (class {name}\n')
              b=s.find(f'    (class {next_name}',a)
              if a<0 or b<0: return
              z=s[a:b]
              z=re.sub(r'\(width \d+\)',f'(width {w})',z,count=1)
              z=re.sub(r'\(clearance \d+\)',f'(clearance {c})',z,count=1)
              s=s[:a]+z+s[b:]
          tune('RF_50','IF_DIFF',300,150)
          tune('IF_DIFF','DIGITAL_HS',180,120)
          tune('DIGITAL_HS','POWER',120,90)
          tune('POWER','DEFAULT',150,90)
          a=s.find('    (class DEFAULT\n')
          if a>=0:
              tail=s[a:]
              tail=re.sub(r'\(width \d+\)','(width 110)',tail,count=1)
              tail=re.sub(r'\(clearance \d+\)','(clearance 90)',tail,count=1)
              s=s[:a]+tail
          p.write_text(s)
          print(group,'kept nets',len(keep),'removed',len(removals))
          PY
      - name: Route group
        run: |
          set -o pipefail
          timeout --signal=TERM --kill-after=2m 130m \
            java -Xmx5600m -jar "$RUNNER_TEMP/freerouting.jar" \
            -de hardware/v2/build/group-${{ matrix.group }}.dsn \
            -do hardware/v2/build/group-${{ matrix.group }}.ses \
            -mp 14 -mt 0 -da -dct 1 --gui.enabled=false \
            2>&1 | tee hardware/v2/build/group-${{ matrix.group }}.log
          test -s hardware/v2/build/group-${{ matrix.group }}.ses
      - name: Upload group route
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Code-SDR-V2-signal-${{ matrix.group }}
          path: |
            hardware/v2/build/group-${{ matrix.group }}.dsn
            hardware/v2/build/group-${{ matrix.group }}.ses
            hardware/v2/build/group-${{ matrix.group }}.log
          retention-days: 1
          if-no-files-found: warn
