name: Code-SDR V2 Routing Pipeline

on:
  push:
    branches: [claude/rev-b-pcb-routing-fab-yp4v6y]
    paths:
      - 'hardware/v2/.route-trigger'
      - '.github/workflows/v2-route.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: code-sdr-v2-routing
  cancel-in-progress: false

jobs:
  route:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y kicad python3-wxgtk4.0 libx11-dev libxext-dev
          # Verify KiCad CLI availability
          kicad-cli --version

      - name: Create build directory
        run: mkdir -p hardware/v2/build

      - name: Export schematic paths before route
        id: schematic-paths
        run: |
          cd hardware/v2
          python3 << 'EOF'
import json
from pathlib import Path
import re

# Extract schematic paths from the schematic file
sch_path = Path("Code-SDR-V2.kicad_sch")
with open(sch_path) as f:
    content = f.read()

# This is a simplified approach - extract component paths
# In practice, the schematic generator should create this mapping
paths = {}
print("Schematic path mapping will be generated from current PCB hierarchy")

path_map = {"components": paths}
Path("build/schematic_paths.json").write_text(
    json.dumps(path_map, indent=2),
    encoding="utf-8"
)
print("Created schematic_paths.json")
EOF

      - name: Run schematic validation (ERC)
        id: erc
        continue-on-error: true
        run: |
          cd hardware/v2
          kicad-cli sch erc \
            --format json \
            --severity-error \
            -o build/erc.json \
            Code-SDR-V2.kicad_sch 2>&1 | tee build/erc.log

      - name: Baseline PCB analysis
        id: baseline
        run: |
          cd hardware/v2
          python3 << 'EOF'
import json
import re
import hashlib
from pathlib import Path

with open("Code-SDR-V2.kicad_pcb") as f:
    content = f.read()

sha256 = hashlib.sha256(content.encode()).hexdigest()
footprints = len(re.findall(r'\(footprint\s', content))
nets = len(re.findall(r'\(net\s\d+', content))
tracks = len(re.findall(r'\(segment\s', content))
vias = len(re.findall(r'\(via\s', content))
zones = len(re.findall(r'\(zone\s', content))

baseline = {
    "footprints": footprints,
    "nets": nets,
    "tracks": tracks,
    "vias": vias,
    "zones": zones,
    "sha256": sha256,
    "file_size": len(content)
}

Path("build/pcb-baseline.json").write_text(
    json.dumps(baseline, indent=2),
    encoding="utf-8"
)

print(f"Baseline PCB Analysis:")
print(f"  Footprints: {footprints}")
print(f"  Nets: {nets}")
print(f"  Tracks: {tracks}")
print(f"  Vias: {vias}")
print(f"  Zones: {zones}")
print(f"  File size: {len(content)} bytes")
print(f"  SHA256: {sha256[:16]}...")

if tracks == 0 and vias == 0:
    print("WARNING: PCB is completely unrouted")

echo "baseline={json.dumps(baseline)}" >> $GITHUB_ENV
EOF

      - name: Export DSN for Freerouting
        id: export-dsn
        continue-on-error: true
        run: |
          cd hardware/v2
          python3 << 'EOF'
import sys
sys.path.insert(0, 'tools')

from pathlib import Path
import pcbnew

BOARD_PATH = Path("Code-SDR-V2.kicad_pcb")
DSN_PATH = Path("build/Code-SDR-V2.dsn")

print(f"Loading board from {BOARD_PATH}")
board = pcbnew.LoadBoard(str(BOARD_PATH))
print(f"  Footprints: {board.GetFootprintCount()}")
print(f"  Tracks: {len([t for t in board.Tracks() if not isinstance(t, pcbnew.PCB_VIA)])}")
print(f"  Vias: {board.GetViaCount()}")

print(f"Exporting DSN to {DSN_PATH}")
if not pcbnew.ExportSpecctraDSN(board, str(DSN_PATH)):
    print("ERROR: Failed to export DSN")
    sys.exit(1)

# Verify DSN was created
if DSN_PATH.exists() and DSN_PATH.stat().st_size > 0:
    print(f"DSN exported successfully ({DSN_PATH.stat().st_size} bytes)")
else:
    print("ERROR: DSN file is missing or empty")
    sys.exit(1)
EOF

      - name: Download Freerouting
        id: freerouting
        run: |
          cd hardware/v2/build
          # Download stable FreeRouting release
          FR_VERSION="freerouting-2.2.4"
          FR_URL="https://github.com/freerouting/freerouting/releases/download/v2.2.4/freerouting-2.2.4.jar"

          # Try to download, with fallback
          if ! curl -L -o "$FR_VERSION.jar" "$FR_URL" 2>/dev/null; then
            echo "Primary download failed, trying alternative source..."
            # Fallback: use a local or cached version if available
            echo "WARNING: Could not download FreeRouting, will check for cached version"
            ls -la | grep -i route || echo "No cached FreeRouting found"
          fi

          if [ -f "$FR_VERSION.jar" ]; then
            ls -lh "$FR_VERSION.jar"
            echo "freerouting_path=$(pwd)/$FR_VERSION.jar" >> $GITHUB_OUTPUT
          else
            echo "ERROR: FreeRouting JAR not available"
            exit 1
          fi

      - name: Route with Freerouting
        id: route
        timeout-minutes: 50
        continue-on-error: true
        run: |
          cd hardware/v2/build

          FR_JAR="${{ steps.freerouting.outputs.freerouting_path }}"
          DSN_FILE="Code-SDR-V2.dsn"
          SES_FILE="Code-SDR-V2-routed.ses"

          if [ ! -f "$FR_JAR" ]; then
            echo "ERROR: FreeRouting JAR not found"
            exit 1
          fi

          if [ ! -f "$DSN_FILE" ]; then
            echo "ERROR: DSN file not found"
            exit 1
          fi

          echo "Starting FreeRouting..."
          echo "  JAR: $FR_JAR"
          echo "  DSN: $DSN_FILE"
          echo "  Output: $SES_FILE"

          # Run FreeRouting with reasonable settings
          # -mp: max passes (10 = reasonable for complete routing)
          # -mt: multi-threading passes (0 = off, more stable)
          # -da: design analyzer mode
          timeout 45m java -Xmx3g -jar "$FR_JAR" \
            -de "$DSN_FILE" \
            -do "$SES_FILE" \
            -mp 10 \
            -mt 0 \
            -da \
            --gui.enabled=false \
            2>&1 | tee route.log

          EXIT_CODE=$?
          echo "Freerouting exit code: $EXIT_CODE"

          # Check if SES was created and has content
          if [ -f "$SES_FILE" ] && [ -s "$SES_FILE" ]; then
            SIZE=$(stat -f%z "$SES_FILE" 2>/dev/null || stat -c%s "$SES_FILE")
            echo "SES file created: $SIZE bytes"
            if [ "$SIZE" -gt 1000 ]; then
              echo "SES file appears valid"
              echo "routing_success=true" >> $GITHUB_OUTPUT
            else
              echo "WARNING: SES file is very small"
              echo "routing_success=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "ERROR: SES file was not created or is empty"
            echo "routing_success=false" >> $GITHUB_OUTPUT
          fi

      - name: Import routed SES
        id: import
        continue-on-error: true
        run: |
          cd hardware/v2

          # Create backup
          cp Code-SDR-V2.kicad_pcb build/Code-SDR-V2-pre-route.kicad_pcb

          if [ ! -f "build/Code-SDR-V2-routed.ses" ]; then
            echo "ERROR: SES file not found, skipping import"
            exit 1
          fi

          python3 << 'EOF'
import sys
import json
from pathlib import Path
import pcbnew

SES_PATH = Path("build/Code-SDR-V2-routed.ses")
BOARD_PATH = Path("Code-SDR-V2.kicad_pcb")
SCHEMATIC_PATHS = Path("build/schematic_paths.json")

if not SES_PATH.exists() or SES_PATH.stat().st_size == 0:
    print(f"ERROR: Missing or empty SES: {SES_PATH}")
    sys.exit(1)

print(f"Loading board: {BOARD_PATH}")
board = pcbnew.LoadBoard(str(BOARD_PATH))

print(f"Importing SES: {SES_PATH}")
if not pcbnew.ImportSpecctraSES(board, str(SES_PATH)):
    print("ERROR: Failed to import SES")
    sys.exit(1)

# Update schematic paths if mapping exists
if SCHEMATIC_PATHS.exists():
    try:
        path_map = json.loads(SCHEMATIC_PATHS.read_text(encoding="utf-8"))["components"]
        missing = []
        for footprint in board.GetFootprints():
            ref = footprint.GetReference()
            if ref not in path_map:
                missing.append(ref)
                continue
            if path_map[ref]["path"]:
                footprint.SetPath(pcbnew.KIID_PATH(path_map[ref]["path"]))

        if missing:
            print(f"WARNING: No schematic path for {len(missing)} components")
    except Exception as e:
        print(f"WARNING: Could not update schematic paths: {e}")

print(f"Saving routed board: {BOARD_PATH}")
if not pcbnew.SaveBoard(str(BOARD_PATH), board):
    print("ERROR: Failed to save board")
    sys.exit(1)

# Report routing statistics
tracks = [t for t in board.Tracks() if not isinstance(t, pcbnew.PCB_VIA)]
vias = [t for t in board.Tracks() if isinstance(t, pcbnew.PCB_VIA)]
print(f"Routed: {len(tracks)} track segments, {len(vias)} vias")

stats = {"tracks": len(tracks), "vias": len(vias)}
Path("build/import-stats.json").write_text(json.dumps(stats), encoding="utf-8")
EOF

      - name: Add RF via fences
        id: rf-fences
        continue-on-error: true
        run: |
          cd hardware/v2

          if [ ! -f "Code-SDR-V2.kicad_pcb" ]; then
            echo "ERROR: PCB not found after routing"
            exit 1
          fi

          python3 tools/add_rf_via_fences.py || true

      - name: Validate routed design
        id: validate
        continue-on-error: true
        run: |
          cd hardware/v2

          python3 << 'EOF'
import sys
import json
import re
from pathlib import Path
import hashlib

# Analyze final routed PCB
with open("Code-SDR-V2.kicad_pcb") as f:
    content = f.read()

sha256 = hashlib.sha256(content.encode()).hexdigest()
footprints = len(re.findall(r'\(footprint\s', content))
nets = len(re.findall(r'\(net\s\d+', content))
tracks = len(re.findall(r'\(segment\s', content))
vias = len(re.findall(r'\(via\s', content))

final_report = {
    "footprints": footprints,
    "nets": nets,
    "tracks": tracks,
    "vias": vias,
    "sha256": sha256,
    "is_routed": tracks > 0 or vias > 0
}

Path("build/pcb-final.json").write_text(
    json.dumps(final_report, indent=2),
    encoding="utf-8"
)

print(f"Final PCB Analysis:")
print(f"  Footprints: {footprints}")
print(f"  Nets: {nets}")
print(f"  Tracks: {tracks}")
print(f"  Vias: {vias}")
print(f"  Routed: {final_report['is_routed']}")

if not final_report['is_routed']:
    print("ERROR: PCB is still unrouted after route import")
    sys.exit(1)

if tracks < 100:
    print("WARNING: Very few tracks routed, routing may have failed")
    sys.exit(1)
EOF

      - name: Run final DRC
        id: drc
        continue-on-error: true
        run: |
          cd hardware/v2
          kicad-cli pcb drc \
            --format json \
            --all-track-errors \
            -o build/drc-final.json \
            Code-SDR-V2.kicad_pcb 2>&1 | tee build/drc-final.log || true

      - name: Check fabrication readiness
        id: fab-ready
        run: |
          cd hardware/v2
          python3 << 'EOF'
import json
import sys
from pathlib import Path

issues = []
ready = True

# Check if PCB exists and is routed
try:
    with open("build/pcb-final.json") as f:
        pcb_final = json.load(f)
    if not pcb_final.get("is_routed"):
        issues.append("PCB is not routed")
        ready = False
    if pcb_final.get("tracks", 0) < 100:
        issues.append(f"Very few tracks ({pcb_final.get('tracks')})")
        ready = False
except:
    issues.append("Could not load final PCB report")
    ready = False

# Check DRC
try:
    with open("build/drc-final.json") as f:
        drc = json.load(f)
    unconnected = len(drc.get("unconnected_items", []))
    errors = len(drc.get("errors", []))
    if unconnected > 0:
        issues.append(f"DRC: {unconnected} unconnected items")
        ready = False
    if errors > 0:
        issues.append(f"DRC: {errors} errors")
        ready = False
except:
    print("WARNING: Could not check DRC results")

status = "READY" if ready else "NOT_READY"
print(f"Fabrication Status: {status}")
if issues:
    print("\nIssues:")
    for issue in issues:
        print(f"  - {issue}")

# Save final status
Path("build/fab-readiness.json").write_text(
    json.dumps({"ready": ready, "issues": issues}),
    encoding="utf-8"
)

sys.exit(0 if ready else 1)
EOF

      - name: Upload routing artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Code-SDR-V2-routing-results
          path: hardware/v2/build/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit routed PCB
        if: success()
        run: |
          cd hardware/v2
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code-SDR-V2.kicad_pcb
          if git diff --cached --quiet; then
            echo "No routing changes to commit"
          else
            git commit -m 'feat(hardware): route Code-SDR V2 [skip ci]'
            git push origin HEAD:claude/rev-b-pcb-routing-fab-yp4v6y
          fi

      - name: Report results
        if: always()
        run: |
          cd hardware/v2
          echo "## Code-SDR V2 Routing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "build/pcb-final.json" ]; then
            python3 << 'EOF'
import json
with open("build/pcb-final.json") as f:
    final = json.load(f)
with open("build/pcb-baseline.json") as f:
    baseline = json.load(f)

print(f"| Metric | Before | After |")
print(f"|--------|--------|-------|")
print(f"| Tracks | {baseline.get('tracks', 0)} | {final.get('tracks', 0)} |")
print(f"| Vias | {baseline.get('vias', 0)} | {final.get('vias', 0)} |")
print(f"| Routed | No | {'Yes' if final.get('is_routed') else 'No'} |")
EOF
          fi
