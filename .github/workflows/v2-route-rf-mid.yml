name: V2 split-band RF completion route

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  route:
    runs-on: ubuntu-24.04
    timeout-minutes: 170
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Recover validated routing baseline
        run: |
          set -euo pipefail
          mkdir -p baseline hardware/v2/build
          gh run download 29689598311 --repo "$GITHUB_REPOSITORY" --name Code-SDR-V2-route-five-pass --dir baseline
          cp baseline/build/Code-SDR-V2.dsn hardware/v2/build/Code-SDR-V2.dsn
          docker pull kicad/kicad:9.0.9-full
          curl -fL --retry 4 --retry-delay 5 -o "$RUNNER_TEMP/freerouting.jar" https://github.com/freerouting/freerouting/releases/download/v2.2.4/freerouting-2.2.4.jar
      - name: Split microwave routing classes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p=Path('hardware/v2/build/Code-SDR-V2.dsn')
          s=p.read_text()
          critical_start=s.index('    (class RF_CRITICAL\n')
          rf50_start=s.index('    (class RF_50\n',critical_start)
          critical=s[critical_start:rf50_start]
          mid_nets=[
            'RF_HA_IN','RF_HA_LNA_IN','RF_HA_LNA_OUT','RF_HA_LNA_OUT_RAW',
            'RF_HB_IN','RF_HB_LNA_IN','RF_HB_LNA_OUT','RF_HB_LNA_OUT_RAW',
          ]
          controls=['RF_HA_ENABLE','RF_HB_ENABLE','RF_HC_ENABLE','RF_HD_ENABLE','RF_HD2_ENABLE']
          for net in mid_nets+controls:
              critical=re.sub(rf'(?<!\S){re.escape(net)}(?!\S)', '', critical)
          critical=re.sub(r'[ \t]+\n','\n',critical)
          mid='    (class RF_MID\n      '+' '.join(mid_nets)+'\n      (circuit\n        (use_via "Via[0-3]_450:200_um")\n        (use_layer F.Cu)\n      )\n      (rule\n        (width 250)\n        (clearance 120)\n      )\n    )\n\n'
          s=s[:critical_start]+critical+mid+s[rf50_start:]
          def tune(name,next_name,width,clearance):
              global s
              a=s.index(f'    (class {name}\n')
              b=s.index(f'    (class {next_name}',a)
              block=s[a:b]
              block=re.sub(r'\(width \d+\)',f'(width {width})',block,count=1)
              block=re.sub(r'\(clearance \d+\)',f'(clearance {clearance})',block,count=1)
              s=s[:a]+block+s[b:]
          tune('RF_CRITICAL','RF_MID',350,180)
          tune('RF_MID','RF_50',250,120)
          tune('RF_50','IF_DIFF',250,120)
          tune('IF_DIFF','DIGITAL_HS',150,100)
          tune('DIGITAL_HS','POWER',120,90)
          tune('POWER','DEFAULT',180,90)
          a=s.index('    (class DEFAULT\n')
          circuit=s.index('      (circuit',a)
          s=s[:circuit]+'      '+' '.join(controls)+'\n'+s[circuit:]
          block=s[a:]
          block=re.sub(r'\(width \d+\)','(width 100)',block,count=1)
          block=re.sub(r'\(clearance \d+\)','(clearance 90)',block,count=1)
          s=s[:a]+block
          p.write_text(s)
          bal=0
          for c in s:
              bal += c=='('
              bal -= c==')'
              if bal<0: raise SystemExit('unbalanced DSN')
          if bal: raise SystemExit('unbalanced DSN')
          PY
          grep -A18 '    (class RF_CRITICAL' hardware/v2/build/Code-SDR-V2.dsn
          grep -A12 '    (class RF_MID' hardware/v2/build/Code-SDR-V2.dsn
          ! grep -q '^    (net GND' hardware/v2/build/Code-SDR-V2.dsn
      - name: Route split-band candidate
        run: |
          timeout --signal=TERM --kill-after=2m 150m \
            java -Xmx5600m -jar "$RUNNER_TEMP/freerouting.jar" \
            -de hardware/v2/build/Code-SDR-V2.dsn \
            -do hardware/v2/build/Code-SDR-V2-rf-mid.ses \
            -mp 20 -mt 0 -da -dct 1 --gui.enabled=false \
            2>&1 | tee hardware/v2/build/freerouting-rf-mid.log
          test -s hardware/v2/build/Code-SDR-V2-rf-mid.ses
      - name: Import and validate candidate
        run: |
          cp baseline/Code-SDR-V2.kicad_pcb hardware/v2/Code-SDR-V2.kicad_pcb
          cat > hardware/v2/build/import_candidate.py <<'PY'
          from pathlib import Path
          import pcbnew
          p=Path('hardware/v2/Code-SDR-V2.kicad_pcb')
          b=pcbnew.LoadBoard(str(p))
          if not pcbnew.ImportSpecctraSES(b,'hardware/v2/build/Code-SDR-V2-rf-mid.ses'):
              raise SystemExit('SES import failed')
          for zone in b.Zones(): zone.SetPadConnection(pcbnew.ZONE_CONNECTION_FULL)
          pcbnew.ZONE_FILLER(b).Fill(b.Zones())
          pcbnew.SaveBoard(str(p),b)
          PY
          docker run --rm --user 0:0 -v "$GITHUB_WORKSPACE:/work" -w /work --entrypoint /bin/bash kicad/kicad:9.0.9-full -lc '
            python3 hardware/v2/build/import_candidate.py
            python3 hardware/v2/tools/add_rf_via_fences.py
            kicad-cli pcb drc --format json --severity-all --all-track-errors --schematic-parity --units mm -o hardware/v2/build/drc-rf-mid.json hardware/v2/Code-SDR-V2.kicad_pcb || true
            python3 hardware/v2/tools/validate_route.py > hardware/v2/build/validate-rf-mid.log 2>&1 || true
          '
          python3 - <<'PY'
          import json
          from collections import Counter
          from pathlib import Path
          d=json.loads(Path('hardware/v2/build/drc-rf-mid.json').read_text())
          s={k:len(d.get(k,[])) for k in ('violations','unconnected_items','schematic_parity')}
          s['violation_types']=dict(Counter(x.get('type','unknown') for x in d.get('violations',[])))
          Path('hardware/v2/build/rf-mid-summary.json').write_text(json.dumps(s,indent=2)+'\n')
          print(s)
          PY
      - name: Upload candidate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Code-SDR-V2-route-rf-mid
          path: |
            hardware/v2/Code-SDR-V2.kicad_pcb
            hardware/v2/build/Code-SDR-V2.dsn
            hardware/v2/build/Code-SDR-V2-rf-mid.ses
            hardware/v2/build/freerouting-rf-mid.log
            hardware/v2/build/drc-rf-mid.json
            hardware/v2/build/rf-mid-summary.json
            hardware/v2/build/validate-rf-mid.log
            hardware/v2/build/ROUTE_STATISTICS.csv
          retention-days: 1
          if-no-files-found: warn
