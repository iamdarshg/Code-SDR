name: V2 RF-only handoff validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-rf-only-board:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Build RF-only board
        run: |
          docker pull kicad/kicad:9.0.9-full
          mkdir -p hardware/v2/build/rf50
          cat > hardware/v2/build/rf50/apply_rf_routes.py <<'PY'
          import json, math
          from pathlib import Path
          import pcbnew

          root = Path('hardware/v2')
          board_path = root / 'Code-SDR-V2.kicad_pcb'
          routes = json.loads((root / 'rf50_routes.json').read_text())['nets']
          routes.update(json.loads((root / 'rf50_group_overrides.json').read_text()))
          routes.update(json.loads((root / 'rf50_manual_overrides.json').read_text()))

          # RF_LOW_IN uses a rotated edge-launch pad; replace the obsolete
          # intermediate connector segment with its actual pad-to-filter escape.
          low = routes['RF_LOW_IN']
          low['paths'] = [p for p in low['paths']
                          if not any(abs(point[0] - 5.6) < 1e-6 for point in p['points'])]
          low['paths'].append({'layer': 'F.Cu', 'width': 0.35,
                               'points': [[-1.72, 44.0], [4.25, 44.0]]})

          board = pcbnew.LoadBoard(str(board_path))
          nets = board.GetNetsByName()
          layers = {'F.Cu': pcbnew.F_Cu, 'In2.Cu': pcbnew.In2_Cu, 'B.Cu': pcbnew.B_Cu}

          # Intentionally retain only the RF/LO/IF handoff copper.
          for item in list(board.GetTracks()):
              board.Remove(item)

          lengths = {}
          vias_by_net = {}
          for net_name, route in routes.items():
              if net_name not in nets:
                  raise SystemExit(f'Missing PCB net: {net_name}')
              net = nets[net_name]
              total = 0.0
              for path in route.get('paths', []):
                  width = float(path['width'])
                  points = path['points']
                  for a, b in zip(points, points[1:]):
                      if math.dist(a, b) < 1e-6:
                          continue
                      track = pcbnew.PCB_TRACK(board)
                      track.SetStart(pcbnew.VECTOR2I_MM(float(a[0]), float(a[1])))
                      track.SetEnd(pcbnew.VECTOR2I_MM(float(b[0]), float(b[1])))
                      track.SetWidth(pcbnew.FromMM(width))
                      track.SetLayer(layers[path['layer']])
                      track.SetNet(net)
                      board.Add(track)
                      total += math.dist(a, b)
              via_count = 0
              for spec in route.get('vias', []):
                  via = pcbnew.PCB_VIA(board)
                  via.SetPosition(pcbnew.VECTOR2I_MM(float(spec['x']), float(spec['y'])))
                  via.SetWidth(pcbnew.FromMM(float(spec.get('diameter', 0.45))))
                  via.SetDrill(pcbnew.FromMM(float(spec.get('drill', 0.20))))
                  via.SetLayerPair(pcbnew.F_Cu, pcbnew.B_Cu)
                  via.SetNet(net)
                  board.Add(via)
                  via_count += 1
              lengths[net_name] = total
              vias_by_net[net_name] = via_count

          pcbnew.ZONE_FILLER(board).Fill(board.Zones())
          pcbnew.SaveBoard(str(board_path), board)
          inventory = {'net_count': len(routes), 'length_mm': lengths, 'vias': vias_by_net}
          (root / 'build/rf50/route_inventory.json').write_text(
              json.dumps(inventory, indent=2) + '\n')
          PY
          docker run --rm --user 0:0 -v "$GITHUB_WORKSPACE:/work" -w /work \
            --entrypoint /bin/bash kicad/kicad:9.0.9-full -lc '
              python3 hardware/v2/build/rf50/apply_rf_routes.py
              kicad-cli pcb drc --format json --severity-all --all-track-errors \
                --schematic-parity --units mm \
                -o hardware/v2/build/rf50/drc.json hardware/v2/Code-SDR-V2.kicad_pcb || true
            '
          sudo chown -R "$USER:$USER" hardware/v2/build/rf50 hardware/v2/Code-SDR-V2.kicad_pcb
      - name: Summarize RF validation
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          root = Path('hardware/v2')
          route_data = json.loads((root / 'rf50_routes.json').read_text())
          target = set(route_data['nets'])
          inv = json.loads((root / 'build/rf50/route_inventory.json').read_text())
          drc = json.loads((root / 'build/rf50/drc.json').read_text())

          def mentions_target(entry):
              text = json.dumps(entry, sort_keys=True)
              return any((f'[{n}]' in text) or (f'"{n}"' in text) for n in target)

          rf_unconnected = [x for x in drc.get('unconnected_items', []) if mentions_target(x)]
          rf_violations = [x for x in drc.get('violations', []) if mentions_target(x)]
          missing_length = sorted(n for n, length in inv['length_mm'].items() if length <= 0)
          critical = sorted(n for n in target if n.startswith(
              ('RF_HA', 'RF_HB', 'RF_HC', 'RF_HD', 'RF_HIGH')) or n in {
              'LMX_LO_HIGH_N_RAW', 'LMX_LO_HIGH_P_RAW', 'LO_HIGH_N_TERM',
              'LO_HIGH_P', 'LTC_LO_IN', 'LTC_RF_IN'})
          critical_vias = {n: inv['vias'][n] for n in critical if inv['vias'][n]}
          summary = {
              'target_net_count': len(target),
              'rf_unconnected_count': len(rf_unconnected),
              'rf_violation_count': len(rf_violations),
              'all_unconnected_count': len(drc.get('unconnected_items', [])),
              'all_violation_count': len(drc.get('violations', [])),
              'schematic_parity_count': len(drc.get('schematic_parity', [])),
              'missing_length_nets': missing_length,
              'critical_rf_vias': critical_vias,
              'excluded_misclassified_controls': route_data.get('excluded_controls', []),
              'rf_unconnected': rf_unconnected,
              'rf_violations': rf_violations,
          }
          (root / 'build/rf50/summary.json').write_text(json.dumps(summary, indent=2) + '\n')
          print(json.dumps({k: v for k, v in summary.items()
                            if k not in ('rf_unconnected', 'rf_violations')}, indent=2))
          PY
      - name: Upload RF-only handoff
        uses: actions/upload-artifact@v4
        with:
          name: Code-SDR-V2-rf50-handoff
          path: |
            hardware/v2/Code-SDR-V2.kicad_pcb
            hardware/v2/rf50_routes.json
            hardware/v2/rf50_group_overrides.json
            hardware/v2/rf50_manual_overrides.json
            hardware/v2/build/rf50/drc.json
            hardware/v2/build/rf50/summary.json
            hardware/v2/build/rf50/route_inventory.json
          retention-days: 3
