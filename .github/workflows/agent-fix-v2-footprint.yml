name: Fix V2 local inductor footprint

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v2-footprint-fix
          fetch-depth: 0
      - name: Add local footprint and update references
        shell: bash
        run: |
          set -euo pipefail
          cat > hardware/v2/CodeSDR.pretty/Inductor_0805_HandSolder.kicad_mod <<'EOF'
          (footprint "Inductor_0805_HandSolder"
            (version 20240108)
            (generator pcbnew)
            (layer "F.Cu")
            (descr "0805 inductor or ferrite bead, enlarged hand-solder pads")
            (tags "inductor ferrite 0805 hand solder")
            (attr smd)
            (fp_rect (start -1.8 -1.05) (end 1.8 1.05)
              (stroke (width 0.05) (type default)) (fill none) (layer "F.CrtYd"))
            (fp_rect (start -1.1 -0.65) (end 1.1 0.65)
              (stroke (width 0.1) (type default)) (fill none) (layer "F.Fab"))
            (fp_line (start -1.7 -0.85) (end 1.7 -0.85)
              (stroke (width 0.12) (type default)) (layer "F.SilkS"))
            (fp_line (start -1.7 0.85) (end 1.7 0.85)
              (stroke (width 0.12) (type default)) (layer "F.SilkS"))
            (fp_text reference "REF**" (at 0 -1.65) (layer "F.SilkS")
              (effects (font (size 1 1) (thickness 0.15))))
            (fp_text value "Inductor_0805_HandSolder" (at 0 1.65) (layer "F.Fab")
              (effects (font (size 1 1) (thickness 0.15))))
            (pad "1" smd roundrect (at -1.05 0) (size 1.4 1.4) (layers "F.Cu" "F.Paste" "F.Mask") (roundrect_rratio 0.18))
            (pad "2" smd roundrect (at 1.05 0) (size 1.4 1.4) (layers "F.Cu" "F.Paste" "F.Mask") (roundrect_rratio 0.18))
          )
          EOF
          python3 - <<'PY'
          from pathlib import Path
          old='Inductor_SMD:L_0805_2012Metric_Pad1.15x1.40mm_HandSolder'
          new='CodeSDR:Inductor_0805_HandSolder'
          paths=[
              Path('hardware/v2/tools/design_model.py'),
              Path('hardware/v2/Code-SDR-V2.kicad_pcb'),
              Path('hardware/v2/sheets/01_power.kicad_sch'),
          ]
          for path in paths:
              text=path.read_text(encoding='utf-8')
              count=text.count(old)
              if count == 0:
                  raise SystemExit(f'{old} not found in {path}')
              path.write_text(text.replace(old,new), encoding='utf-8')
              print(path, count)
          PY
          rm -f .github/workflows/agent-fix-v2-footprint.yml
      - name: Verify and commit
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile hardware/v2/tools/design_model.py
          grep -R "CodeSDR:Inductor_0805_HandSolder" hardware/v2/tools/design_model.py hardware/v2/Code-SDR-V2.kicad_pcb hardware/v2/sheets/01_power.kicad_sch
          ! grep -R "Inductor_SMD:L_0805_2012Metric_Pad1.15x1.40mm_HandSolder" hardware/v2/tools/design_model.py hardware/v2/Code-SDR-V2.kicad_pcb hardware/v2/sheets/01_power.kicad_sch
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(hardware): use project-local 0805 inductor footprint [skip ci]'
          git push origin HEAD:agent/v2-footprint-fix
