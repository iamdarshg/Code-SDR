name: V2 remove orphan GND islands

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

env:
  GH_TOKEN: ${{ github.token }}
  SOURCE_RUN_ID: '29691653824'
  SOURCE_ARTIFACT: Code-SDR-V2-route-five-pass

jobs:
  remove-islands:
    if: github.head_ref == 'agent/v2-gnd-island-stitch'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v2-gnd-island-stitch
      - name: Recover routed checkpoint and DRC
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p recovered hardware/v2/build
          gh run download "$SOURCE_RUN_ID" --repo "$GITHUB_REPOSITORY" --name "$SOURCE_ARTIFACT" --dir recovered
          board=$(find recovered -type f -name 'Code-SDR-V2.kicad_pcb' -print -quit)
          drc=$(find recovered -type f -name 'drc-diagnostic.json' -print -quit)
          test -n "$board"; test -n "$drc"
          cp "$board" hardware/v2/Code-SDR-V2.kicad_pcb
          cp "$drc" hardware/v2/build/drc-before.json
          docker pull kicad/kicad:9.0.9-full
      - name: Remove orphaned outer-layer GND pour islands
        shell: bash
        run: |
          cat > hardware/v2/build/remove_gnd_islands.py <<'PY'
          from pathlib import Path
          import pcbnew

          p=Path('hardware/v2/Code-SDR-V2.kicad_pcb')
          b=pcbnew.LoadBoard(str(p))
          enum=getattr(pcbnew,'ISLAND_REMOVAL_MODE',None)
          always=getattr(pcbnew,'ISLAND_REMOVAL_MODE_ALWAYS',None)
          if always is None and enum is not None:
              always=enum.ALWAYS
          if always is None:
              raise SystemExit('KiCad island-removal enum unavailable')
          changed=[]
          for z in b.Zones():
              if z.GetNetname()=='GND' and z.GetLayer() in (pcbnew.F_Cu,pcbnew.B_Cu):
                  z.SetIslandRemovalMode(always)
                  z.SetPadConnection(pcbnew.ZONE_CONNECTION_FULL)
                  z.UnFill()
                  z.SetNeedRefill(True)
                  changed.append(b.GetLayerName(z.GetLayer()))
          for fp in b.GetFootprints():
              for pad in fp.Pads():
                  if pad.GetNetname()=='GND':
                      pad.SetZoneConnection(pcbnew.ZONE_CONNECTION_FULL)
          pcbnew.ZONE_FILLER(b).Fill(b.Zones(),True)
          pcbnew.SaveBoard(str(p),b)
          print({'zones_unfilled_and_refilled_with_island_removal':changed})
          PY
          docker run --rm --user 0:0 -v "$GITHUB_WORKSPACE:/work" -w /work --entrypoint /bin/bash kicad/kicad:9.0.9-full -lc '
            python3 hardware/v2/build/remove_gnd_islands.py
            kicad-cli pcb drc --format json --severity-all --all-track-errors --schematic-parity --units mm -o hardware/v2/build/drc-after.json hardware/v2/Code-SDR-V2.kicad_pcb || true
          '
      - name: Compare DRC
        shell: bash
        run: |
          python3 - <<'PY'
          import json,re
          from collections import Counter
          from pathlib import Path
          def stats(path):
              d=json.loads(Path(path).read_text()); nets=Counter()
              for u in d.get('unconnected_items',[]):
                  names=set()
                  for item in u.get('items',[]): names.update(re.findall(r'\[([^\]]+)\]',item.get('description','')))
                  for n in names:nets[n]+=1
              return {'violations':len(d.get('violations',[])),'unconnected_items':len(d.get('unconnected_items',[])),'parity':len(d.get('schematic_parity',[])),'gnd_unconnected':nets.get('GND',0),'by_net':dict(nets.most_common())}
          out={'before':stats('hardware/v2/build/drc-before.json'),'after':stats('hardware/v2/build/drc-after.json')}
          Path('hardware/v2/build/gnd-island-removal-summary.json').write_text(json.dumps(out,indent=2)+'\n')
          print(json.dumps(out,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: v2-gnd-island-removal
          path: |
            hardware/v2/Code-SDR-V2.kicad_pcb
            hardware/v2/build/drc-before.json
            hardware/v2/build/drc-after.json
            hardware/v2/build/gnd-island-removal-summary.json
          retention-days: 2
