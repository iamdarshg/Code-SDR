name: V2 v19 aggressive completion route

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  route-v19-aggressive:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Recover validated DSN and tools
        run: |
          set -euo pipefail
          mkdir -p baseline hardware/v2/build
          gh run download 29689598311 --repo "$GITHUB_REPOSITORY" --name Code-SDR-V2-route-five-pass --dir baseline
          cp baseline/build/Code-SDR-V2.dsn hardware/v2/build/Code-SDR-V2-v19.dsn
          curl -fL --retry 4 --retry-delay 5 -o "$RUNNER_TEMP/freerouting.jar" https://github.com/freerouting/freerouting/releases/download/v2.2.4/freerouting-2.2.4.jar
      - name: Tune dense routing classes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p=Path('hardware/v2/build/Code-SDR-V2-v19.dsn')
          s=p.read_text()
          start=s.index('    (class RF_CRITICAL\n')
          end=s.index('    (class RF_50\n',start)
          block=s[start:end]
          controls=['RF_HA_ENABLE','RF_HB_ENABLE','RF_HC_ENABLE','RF_HD_ENABLE','RF_HD2_ENABLE']
          for n in controls:
              block=re.sub(r'(?<!\S)'+re.escape(n)+r'(?!\S)', '', block)
          mid=['RF_HA_IN','RF_HA_LNA_IN','RF_HA_LNA_OUT','RF_HA_LNA_OUT_RAW','RF_HB_IN','RF_HB_LNA_IN','RF_HB_LNA_OUT','RF_HB_LNA_OUT_RAW']
          for n in mid:
              block=re.sub(r'(?<!\S)'+re.escape(n)+r'(?!\S)', '', block)
          mid_block='''    (class RF_MID\n      '''+' '.join(mid)+'''\n      (circuit\n        (use_via "Via[0-3]_450:200_um")\n        (use_layer F.Cu)\n      )\n      (rule\n        (width 220)\n        (clearance 110)\n      )\n    )\n'''
          s=s[:start]+block+mid_block+s[end:]
          def tune(name,next_name,width,clearance):
              global s
              a=s.index(f'    (class {name}\n')
              b=s.index(f'    (class {next_name}',a)
              part=s[a:b]
              part=re.sub(r'\(width \d+\)',f'(width {width})',part,count=1)
              part=re.sub(r'\(clearance \d+\)',f'(clearance {clearance})',part,count=1)
              s=s[:a]+part+s[b:]
          tune('RF_50','IF_DIFF',270,125)
          tune('IF_DIFF','DIGITAL_HS',150,95)
          tune('DIGITAL_HS','POWER',105,85)
          tune('POWER','DEFAULT',155,85)
          a=s.index('    (class DEFAULT\n')
          s=s[:a]+re.sub(r'\(width \d+\)', '(width 100)', s[a:], count=1)
          a=s.index('    (class DEFAULT\n')
          s=s[:a]+re.sub(r'\(clearance \d+\)', '(clearance 85)', s[a:], count=1)
          p.write_text(s)
          PY
          grep -A12 '    (class RF_MID' hardware/v2/build/Code-SDR-V2-v19.dsn
          grep -A8 '    (class POWER' hardware/v2/build/Code-SDR-V2-v19.dsn
      - name: Route with v19 engine
        run: |
          set -o pipefail
          timeout --signal=TERM --kill-after=2m 160m \
            java -Xmx5600m -jar "$RUNNER_TEMP/freerouting.jar" \
            -de hardware/v2/build/Code-SDR-V2-v19.dsn \
            -do hardware/v2/build/Code-SDR-V2-v19.ses \
            -mp 20 -mt 0 -da -dct 1 \
            --router.algorithm=freerouting-router-v19 \
            --router.scoring.unroutedNetPenalty=12000.0 \
            --router.scoring.clearanceViolationPenalty=3000.0 \
            --router.scoring.viaCosts=25 \
            --router.scoring.startRipupCosts=60 \
            --gui.enabled=false \
            2>&1 | tee hardware/v2/build/freerouting-v19.log
          test -s hardware/v2/build/Code-SDR-V2-v19.ses
      - name: Upload v19 route
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Code-SDR-V2-v19-aggressive
          path: |
            hardware/v2/build/Code-SDR-V2-v19.dsn
            hardware/v2/build/Code-SDR-V2-v19.ses
            hardware/v2/build/freerouting-v19.log
          retention-days: 1
          if-no-files-found: warn
