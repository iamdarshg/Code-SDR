name: V2 route from all-layer power checkpoint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  complete:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Prepare KiCad, Freerouting, baseline, and checkpoint
        run: |
          set -euo pipefail
          mkdir -p baseline hardware/v2/build
          gh run download 29689598311 --repo "$GITHUB_REPOSITORY" --name Code-SDR-V2-route-five-pass --dir baseline
          test -s baseline/build/Code-SDR-V2.dsn
          base64 -d hardware/v2/build/power-only-all.ses.gz.b64 | gzip -d > hardware/v2/build/power-only-all.ses
          sed -i '1s/"power-only-all"/"Code-SDR-V2"/; 2s/"power-only-all"/"Code-SDR-V2"/' hardware/v2/build/power-only-all.ses
          test -s hardware/v2/build/power-only-all.ses
          docker pull kicad/kicad:9.0.9-full
          curl -fL --retry 4 --retry-delay 5 -o "$RUNNER_TEMP/freerouting.jar" https://github.com/freerouting/freerouting/releases/download/v2.2.4/freerouting-2.2.4.jar
      - name: Import power checkpoint and export full routed DSN
        run: |
          cat > hardware/v2/build/import_power_checkpoint.py <<'PY'
          from pathlib import Path
          import pcbnew
          board_path=Path('hardware/v2/Code-SDR-V2.kicad_pcb')
          board=pcbnew.LoadBoard(str(board_path))
          if not pcbnew.ImportSpecctraSES(board,'hardware/v2/build/power-only-all.ses'):
              raise SystemExit('power checkpoint SES import failed')
          tracks=sum(1 for _ in board.GetTracks())
          print('imported power tracks/vias:',tracks)
          if tracks < 20:
              raise SystemExit('power checkpoint imported no usable copper')
          pcbnew.ZONE_FILLER(board).Fill(board.Zones())
          pcbnew.SaveBoard(str(board_path),board)
          out=Path('hardware/v2/build/Code-SDR-V2-after-power.dsn')
          pcbnew.ExportSpecctraDSN(board,str(out))
          if not out.is_file() or out.stat().st_size < 10000:
              raise SystemExit('full checkpoint DSN export failed')
          PY
          docker run --rm --user 0:0 -v "$GITHUB_WORKSPACE:/work" -w /work --entrypoint /bin/bash kicad/kicad:9.0.9-full -lc 'python3 hardware/v2/build/import_power_checkpoint.py'
          sudo chown -R "$USER:$USER" hardware/v2/build hardware/v2/Code-SDR-V2.kicad_pcb
      - name: Restore classes and tune remaining-route rules
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p=Path('hardware/v2/build/Code-SDR-V2-after-power.dsn')
          s=p.read_text().replace('Via[0-3]_600:300_um','Via[0-3]_450:200_um')
          base=Path('baseline/build/Code-SDR-V2.dsn').read_text().replace('Via[0-3]_600:300_um','Via[0-3]_450:200_um')

          def block_end(text,start):
              depth=0; quoted=False; escaped=False
              for i in range(start,len(text)):
                  c=text[i]
                  if quoted:
                      if escaped: escaped=False
                      elif c=='\\': escaped=True
                      elif c=='"': quoted=False
                  else:
                      if c=='"': quoted=True
                      elif c=='(': depth+=1
                      elif c==')':
                          depth-=1
                          if depth==0: return i+1
              raise RuntimeError('unbalanced DSN block')

          # KiCad re-exports one kicad_default class. Restore the validated routing classes.
          b0=base.index('    (class RF_CRITICAL\n')
          b1=base.index('  )\n  (wiring',b0)
          classes=base[b0:b1]
          classes=re.sub(r'(?<!\S)GND(?!\S)','',classes)
          n0=s.index('  (network\n')
          c0=s.index('    (class ',n0)
          c1=s.index('  )\n  (wiring',c0)
          s=s[:c0]+classes+s[c1:]

          # GND is handled by the continuous copper planes, not by the signal router.
          for pattern in ('    (net GND\n','    (net "GND"\n'):
              while True:
                  a=s.find(pattern)
                  if a<0: break
                  s=s[:a]+s[block_end(s,a):]

          def tune(name,next_name,width,clearance):
              global s
              a=s.index(f'    (class {name}\n')
              b=s.index(f'    (class {next_name}',a)
              z=s[a:b]
              z=re.sub(r'\(width \d+\)',f'(width {width})',z,count=1)
              z=re.sub(r'\(clearance \d+\)',f'(clearance {clearance})',z,count=1)
              s=s[:a]+z+s[b:]

          # Preserve RF_CRITICAL unchanged: 0.35 mm, F.Cu-only, no signal vias.
          tune('RF_50','IF_DIFF',300,150)
          tune('IF_DIFF','DIGITAL_HS',180,120)
          tune('DIGITAL_HS','POWER',130,100)
          tune('POWER','DEFAULT',200,100)
          a=s.index('    (class DEFAULT\n')
          tail=s[a:]
          tail=re.sub(r'\(width \d+\)','(width 120)',tail,count=1)
          tail=re.sub(r'\(clearance \d+\)','(clearance 100)',tail,count=1)
          s=s[:a]+tail

          spans=[]; pos=0
          while True:
              a=s.find('    (wire\n',pos)
              if a<0: break
              b=block_end(s,a)
              spans.append((a,b,s[a:b])); pos=b
          drops=[]
          for a,b,w in spans:
              m=re.search(r'\(path\s+\S+\s+\d+\s+([^)]*)\)',w)
              if not m: continue
              vals=[float(x) for x in m.group(1).split()]
              pts=list(zip(vals[0::2],vals[1::2]))
              if len(set(pts))<2: drops.append((a,b))
          for a,b in reversed(drops): s=s[:a]+s[b:]
          p.write_text(s)
          print('restored class blocks; dropped zero-length wires:',len(drops))
          PY
          grep -A10 '    (class RF_CRITICAL' hardware/v2/build/Code-SDR-V2-after-power.dsn | head -14
          grep -A8 '    (class POWER' hardware/v2/build/Code-SDR-V2-after-power.dsn
      - name: Route remaining connections
        run: |
          set -o pipefail
          timeout --signal=TERM --kill-after=2m 145m \
            java -Xmx5600m -jar "$RUNNER_TEMP/freerouting.jar" \
            -de hardware/v2/build/Code-SDR-V2-after-power.dsn \
            -do hardware/v2/build/Code-SDR-V2-after-power.ses \
            -mp 18 -mt 0 -da -dct 1 --gui.enabled=false \
            2>&1 | tee hardware/v2/build/freerouting-after-power.log
          test -s hardware/v2/build/Code-SDR-V2-after-power.ses
      - name: Import and validate candidate
        run: |
          cat > hardware/v2/build/import_after_power.py <<'PY'
          import pcbnew
          p='hardware/v2/Code-SDR-V2.kicad_pcb'
          board=pcbnew.LoadBoard(p)
          if not pcbnew.ImportSpecctraSES(board,'hardware/v2/build/Code-SDR-V2-after-power.ses'):
              raise SystemExit('final SES import failed')
          for zone in board.Zones(): zone.SetPadConnection(pcbnew.ZONE_CONNECTION_FULL)
          pcbnew.ZONE_FILLER(board).Fill(board.Zones())
          pcbnew.SaveBoard(p,board)
          PY
          docker run --rm --user 0:0 -v "$GITHUB_WORKSPACE:/work" -w /work --entrypoint /bin/bash kicad/kicad:9.0.9-full -lc '
            python3 hardware/v2/build/import_after_power.py
            kicad-cli pcb drc --format json --severity-all --all-track-errors --schematic-parity --units mm -o hardware/v2/build/drc-after-power.json hardware/v2/Code-SDR-V2.kicad_pcb || true
          '
          python3 - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path('hardware/v2/build/drc-after-power.json').read_text())
          summary={k:len(d.get(k,[])) for k in ('violations','unconnected_items','schematic_parity')}
          Path('hardware/v2/build/after-power-summary.json').write_text(json.dumps(summary,indent=2)+'\n')
          print(summary)
          PY
      - name: Upload candidate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Code-SDR-V2-after-power
          path: |
            hardware/v2/Code-SDR-V2.kicad_pcb
            hardware/v2/build/Code-SDR-V2-after-power.dsn
            hardware/v2/build/Code-SDR-V2-after-power.ses
            hardware/v2/build/freerouting-after-power.log
            hardware/v2/build/drc-after-power.json
            hardware/v2/build/after-power-summary.json
          retention-days: 1
          if-no-files-found: warn
