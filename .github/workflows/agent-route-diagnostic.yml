name: V2 route diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Prepare tools
        run: |
          docker pull kicad/kicad:9.0.9-full
          curl -fL --retry 4 -o "$RUNNER_TEMP/freerouting.jar" https://github.com/freerouting/freerouting/releases/download/v2.2.4/freerouting-2.2.4.jar
      - name: Export signal-only DSN
        run: |
          mkdir -p hardware/v2/build
          docker run --rm --user 0:0 -v "$GITHUB_WORKSPACE:/work" -w /work --entrypoint /bin/bash kicad/kicad:9.0.9-full -lc 'python3 hardware/v2/tools/export_route_checkpoint.py'
          ! grep -q '^    (net GND' hardware/v2/build/Code-SDR-V2.dsn
      - name: Run one routing pass
        run: |
          timeout --signal=TERM --kill-after=1m 30m java -Xmx5600m -jar "$RUNNER_TEMP/freerouting.jar" -de hardware/v2/build/Code-SDR-V2.dsn -do hardware/v2/build/Code-SDR-V2-routed.ses -mp 1 -mt 0 -da -dct 1 --gui.enabled=false 2>&1 | tee hardware/v2/build/freerouting-diagnostic.log
          test -s hardware/v2/build/Code-SDR-V2-routed.ses
      - name: Import, refill, and measure
        run: |
          cat > hardware/v2/build/import_diagnostic.py <<'PY'
          import json
          from pathlib import Path
          import pcbnew
          p=Path('hardware/v2/Code-SDR-V2.kicad_pcb')
          b=pcbnew.LoadBoard(str(p))
          if not pcbnew.ImportSpecctraSES(b,'hardware/v2/build/Code-SDR-V2-routed.ses'):
              raise SystemExit('SES import failed')
          pcbnew.ZONE_FILLER(b).Fill(b.Zones())
          pcbnew.SaveBoard(str(p),b)
          print('tracks',len(list(b.GetTracks())))
          PY
          docker run --rm --user 0:0 -v "$GITHUB_WORKSPACE:/work" -w /work --entrypoint /bin/bash kicad/kicad:9.0.9-full -lc '
            python3 hardware/v2/build/import_diagnostic.py
            python3 hardware/v2/tools/add_rf_via_fences.py
            kicad-cli pcb drc --format json --severity-all --all-track-errors --schematic-parity --units mm -o hardware/v2/build/drc-diagnostic.json hardware/v2/Code-SDR-V2.kicad_pcb || true
            python3 hardware/v2/tools/validate_route.py || true
          '
          python3 - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path('hardware/v2/build/drc-diagnostic.json').read_text())
          s={k:len(d.get(k,[])) for k in ('violations','unconnected_items','schematic_parity')}
          Path('hardware/v2/build/diagnostic-summary.json').write_text(json.dumps(s,indent=2)+'\n')
          print(s)
          PY
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Code-SDR-V2-route-diagnostic
          path: |
            hardware/v2/Code-SDR-V2.kicad_pcb
            hardware/v2/build/Code-SDR-V2.dsn
            hardware/v2/build/Code-SDR-V2-routed.ses
            hardware/v2/build/freerouting-diagnostic.log
            hardware/v2/build/drc-diagnostic.json
            hardware/v2/build/diagnostic-summary.json
            hardware/v2/build/ROUTE_STATISTICS.csv
          retention-days: 1
          if-no-files-found: warn
