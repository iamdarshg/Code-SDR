name: Export Freerouting tool

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Build minimal Java 25 Freerouting runtime
        run: |
          set -euo pipefail
          curl -fL --retry 4 --retry-delay 5 -o freerouting-2.2.4.jar https://github.com/freerouting/freerouting/releases/download/v2.2.4/freerouting-2.2.4.jar
          sha256sum freerouting-2.2.4.jar > freerouting-2.2.4.sha256
          modules="$($JAVA_HOME/bin/jdeps --multi-release 25 --ignore-missing-deps --print-module-deps freerouting-2.2.4.jar || true)"
          modules="${modules:-java.base,java.desktop,java.logging,java.management,java.net.http,java.sql,java.xml,jdk.unsupported}"
          echo "jlink modules: $modules"
          "$JAVA_HOME/bin/jlink" --add-modules "$modules" --output java25-runtime --strip-debug --no-header-files --no-man-pages
          java25-runtime/bin/java -jar freerouting-2.2.4.jar --help >/dev/null
          tar -czf java25-runtime.tar.gz java25-runtime
          sha256sum java25-runtime.tar.gz > java25-runtime.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: freerouting-java25-runtime
          path: |
            freerouting-2.2.4.jar
            freerouting-2.2.4.sha256
            java25-runtime.tar.gz
            java25-runtime.sha256
          retention-days: 1
