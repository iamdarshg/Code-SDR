name: Export Freerouting tool

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          java-package: jre
      - name: Package Java 25 Freerouting runtime
        run: |
          set -euo pipefail
          curl -fL --retry 4 --retry-delay 5 -o freerouting-2.2.4.jar https://github.com/freerouting/freerouting/releases/download/v2.2.4/freerouting-2.2.4.jar
          sha256sum freerouting-2.2.4.jar > freerouting-2.2.4.sha256
          real_java_home="$(dirname "$(dirname "$(readlink -f "$JAVA_HOME/bin/java")")")"
          echo "Resolved Java runtime: $real_java_home"
          "$real_java_home/bin/java" -version
          tar -C "$(dirname "$real_java_home")" -czf java25-runtime.tar.gz "$(basename "$real_java_home")"
          test "$(stat -c %s java25-runtime.tar.gz)" -gt 10000000
          sha256sum java25-runtime.tar.gz > java25-runtime.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: freerouting-java25-runtime
          path: |
            freerouting-2.2.4.jar
            freerouting-2.2.4.sha256
            java25-runtime.tar.gz
            java25-runtime.sha256
          retention-days: 1
