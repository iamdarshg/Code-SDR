name: Export Freerouting tool

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Package Freerouting and Java 25
        run: |
          curl -fL --retry 4 --retry-delay 5 -o freerouting-2.2.4.jar https://github.com/freerouting/freerouting/releases/download/v2.2.4/freerouting-2.2.4.jar
          sha256sum freerouting-2.2.4.jar > freerouting-2.2.4.sha256
          tar -C "$(dirname "$JAVA_HOME")" -czf temurin-25-linux-x64.tar.gz "$(basename "$JAVA_HOME")"
          sha256sum temurin-25-linux-x64.tar.gz > temurin-25-linux-x64.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: freerouting-java25-toolchain
          path: |
            freerouting-2.2.4.jar
            freerouting-2.2.4.sha256
            temurin-25-linux-x64.tar.gz
            temurin-25-linux-x64.sha256
          retention-days: 1
